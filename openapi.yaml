            "application/json":
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: ID единицы измерения (используется в unit_id при создании товара)
                          example: 1
                        name:
                          type: string
                          description: Название на русском языке
                          example: штука
