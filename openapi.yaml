        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: search
          in: query
          schema:
            type: string
          description: Поиск по названию
        - name: barcode
          in: query
          schema:
            type: string
          description: Фильтр по штрихкоду
        - name: first_char
          in: query
          schema:
            type: string
          description: Фильтр по первой букве
      responses:
        200:
          description: Список товаров каталога
          content:
            "application/json":
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Coffee Latte
                        selling_price:
                          type: number
                          example: 1800
                        unit_id:
                          type: integer
                          example: 1
                        barcode:
                          type: string
                          nullable: true
                          example: "4901234567890"
                        image_url:
                          type: string
                          nullable: true
                          example: https://example.com/images/coffee.png
                        status:
                          type: string
                          example: active
                        created_at:
                          type: string
                          format: date-time
                          description: Дата создания товара в системе (ISO 8601)
                          example: "2026-03-29T10:30:00+00:00"
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 2
                      per_page:
                        type: integer
                        example: 50
                      total:
                        type: integer
                        example: 75
