          description: Каталог не включён для организации
        404:
          description: Верифицированная организация не найдена
    post:
      summary: Создать товары каталога
      description: Создаёт один или несколько товаров каталога (пакетная операция, 1-50 товаров)
      operationId: createCatalogItems
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              properties:
                items:
                  type: array
                  description: Массив товаров (1-50)
                  minItems: 1
                  maxItems: 50
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Название товара
                        maxLength: 255
                        example: Coffee Latte
                      selling_price:
                        type: number
                        description: Цена
                        minimum: 0.01
                        example: 1800
                      unit_id:
                        type: integer
                        description: ID единицы измерения
                        example: 1
                      image_id:
                        type: string
                        format: uuid
                        description: ID изображения из upload-image
                      barcode:
                        type: string
                        nullable: true
                        description: Штрихкод товара (макс 50 символов)
                        maxLength: 50
                    required:
                      - name
                      - selling_price
                      - unit_id
              required:
                - items
      responses:
        202:
          description: Товары созданы со статусом pending, синхронизация запланирована
          content:
            "application/json":
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Созданные товары со статусом pending
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 10
                        name:
                          type: string
                          example: Coffee Latte
                        selling_price:
                          type: number
                          example: 1800
                        unit_id:
                          type: integer
                          example: 1
                        barcode:
                          type: string
                          nullable: true
                        status:
                          type: string
                          enum:
                            - pending
                          description: Всегда pending при создании
                        created_at:
                          type: string
                          format: date-time
                          description: Дата создания товара в системе (ISO 8601)
                          example: "2026-03-29T10:30:00+00:00"
        422:
          description: Ошибка валидации
        502:
          description: Ошибка Kaspi API
        503:
          description: Kaspi сессия истекла
  "/catalog/upload-image":
    post:
      summary: Загрузить изображение товара
      description: Загружает изображение для товара каталога. Изображения оптимизируются (макс 512x512, PNG) и дедуплицируются по MD5.
      operationId: uploadCatalogImage
      requestBody:
        required: true
        content:
          "multipart/form-data":
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Файл изображения (jpg, png, gif, webp), макс 10 МБ
              required:
                - image
      responses:
        200:
          description: Изображение загружено
          content:
            "application/json":
              schema:
                type: object
                properties:
                  image_id:
                    type: string
                    format: uuid
                    description: ID изображения для использования при создании/обновлении товара
  "/catalog/{id}":
    patch:
      summary: Обновить товар каталога
      description: Обновляет товар каталога. Все поля опциональны — обновляются только переданные.
      operationId: updateCatalogItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID товара
      requestBody:
        content:
          "application/json":
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                  example: Coffee Latte (updated)
                selling_price:
                  type: number
                  minimum: 0.01
                  example: 2000
                unit_id:
                  type: integer
                  example: 1
                image_id:
                  type: string
                  format: uuid
                  description: Новый ID изображения
                is_image_deleted:
                  type: boolean
                  description: Установить true для удаления изображения
                barcode:
                  type: string
                  nullable: true
                  description: Штрихкод товара (макс 50 символов)
                  maxLength: 50
      responses:
        200:
          description: Обновление товара (sandbox — синхронно)
        202:
          description: Обновление товара поставлено в очередь (production)
          content:
            "application/json":
              schema:
                type: object
                properties:
