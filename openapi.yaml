openapi: "3.0.0"
info:
  title: ApiPay.kz REST API
  version: "2.0.0"
  description: REST API для интернет-эквайринга через Kaspi Pay в Казахстане. Приём платежей по номеру телефона без договора с банком. Поддержка каталога, подписок, возвратов и вебхуков. При регистрации создаётся sandbox-организация для тестирования API. Webhook payloads содержат поле is_sandbox для различения тестовых и реальных событий.
  contact:
    name: ApiPay.kz Support
    url: https://wa.me/77085167489
servers:
  - url: https://bpapi.bazarbay.site/api/v1
    description: Production API
paths:
  "/status":
    get:
      summary: Health check
      description: Проверка доступности API. Не требует аутентификации.
      operationId: healthCheck
      security: []
      responses:
        200:
          description: API доступен
          content:
            "application/json":
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
  "/invoices":
    post:
      summary: Создание счёта
      description: "Создаёт счёт на оплату. Поддерживает два режима: без корзины (передать amount) или с корзиной (передать cart_items, amount рассчитывается автоматически)."
      operationId: createInvoice
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              properties:
                amount:
                  type: number
                  description: Сумма в тенге (0.01 - 99999999.99). Игнорируется при наличии cart_items.
                  minimum: 0.01
                  maximum: 99999999.99
                  example: 10000
                phone_number:
                  type: string
                  description: "Телефон клиента (формат: 8XXXXXXXXXX)"
                  pattern: ^8[0-9]{10}$
                  example: "87001234567"
                description:
                  type: string
                  description: Описание платежа (макс 500 символов)
                  maxLength: 500
                  example: "Оплата заказа #123"
                external_order_id:
                  type: string
                  description: Внешний ID заказа для сопоставления (макс 255 символов)
                  maxLength: 255
                  example: order_123
                cart_items:
                  type: array
                  description: Товары корзины (только для организаций с каталогом). При наличии amount игнорируется.
                  items:
                    type: object
                    properties:
                      catalog_item_id:
                        type: integer
                        description: ID товара из каталога (поле id из GET /catalog)
                      count:
                        type: integer
                        description: Количество
                        minimum: 1
                      price:
                        type: number
                        nullable: true
                        description: Кастомная цена (0.01 - 99999999.99). Заменяет каталожную цену.
                        minimum: 0.01
                        maximum: 99999999.99
                    required:
                      - catalog_item_id
                      - count
                discount_percentage:
                  type: number
                  nullable: true
                  description: Глобальный % скидки (1-99). Применяется ко всему чеку.
                  minimum: 1
                  maximum: 99
              required:
                - phone_number
      responses:
        201:
          description: Счёт создан
          content:
            "application/json":
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: ID счёта
                    example: 42
                  amount:
                    type: string
                    description: Сумма счёта
                    example: "15000.00"
                  status:
                    type: string
                    enum:
                      - pending
                  subtotal:
                    type: string
                    description: Сумма до скидок (появляется только при наличии скидки)
                    example: "16500.00"
                  discount_sum:
                    type: string
                    description: Общая сумма скидки (появляется только при наличии скидки)
                    example: "1500.00"
                  discount_percentage:
                    type: string
                    description: Глобальный % скидки (появляется только если передан)
                    example: "10"
                  paid_at:
                    type: string
                    format: date-time
                    nullable: true
                    description: Всегда null при создании
                  created_at:
                    type: string
                    format: date-time
        400:
          description: Организация не найдена или не верифицирована
        401:
          description: Неверный API ключ
        422:
          description: Ошибка валидации
    get:
      summary: Список счетов
      description: Возвращает список счетов с пагинацией, фильтрацией и сортировкой
      operationId: listInvoices
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
            maxLength: 100
          description: Поиск по ID или описанию
        - name: status[]
          in: query
          schema:
            type: array
            items:
              type: string
              enum:
                - pending
                - paid
                - cancelled
                - expired
          description: Фильтр по статусам
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: Дата от (YYYY-MM-DD)
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: Дата до (YYYY-MM-DD, должна быть >= date_from)
        - name: sort_by
          in: query
          schema:
            type: string
            enum:
              - id
              - amount
              - client_name
              - status
              - created_at
            default: created_at
          description: Поле сортировки
        - name: sort_order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          description: Направление сортировки
      responses:
        200:
          description: Список счетов
          content:
            "application/json":
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 42
                        amount:
                          type: string
                          example: "15000.00"
                        phone:
                          type: string
                          description: Телефон клиента (формат 7XXXXXXXXXX)
                          example: "77001234567"
                        description:
                          type: string
                          nullable: true
                          example: "Оплата заказа #123"
                        external_order_id:
                          type: string
                          nullable: true
                          example: order_123
                        status:
                          type: string
                          example: paid
                        kaspi_invoice_id:
                          type: string
                          nullable: true
                          example: "13234689513"
                        expires_at:
                          type: string
                          format: date-time
                          nullable: true
                          description: Время истечения счёта
                        paid_at:
                          type: string
                          format: date-time
                          nullable: true
                        is_sandbox:
                          type: boolean
                          example: false
                        is_recurring:
                          type: boolean
                          example: false
                          description: Счёт создан подпиской
                        client_name:
                          type: string
                          nullable: true
                          example: Иван Иванов
                        items:
                          type: array
                          description: Товары счёта (пустой массив для счетов без корзины)
                          example: []
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 5
                      per_page:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 48
  "/invoices/{id}":
    get:
      summary: Получить счёт
      operationId: getInvoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Данные счёта
          content:
            "application/json":
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 42
                  amount:
                    type: string
                    example: "15000.00"
                  phone_number:
                    type: string
                    example: "87001234567"
                  description:
                    type: string
                    nullable: true
                    example: "Оплата заказа #123"
                  external_order_id:
                    type: string
                    nullable: true
                    example: order_123
                  status:
                    type: string
                    enum:
                      - pending
                      - cancelling
                      - paid
                      - cancelled
                      - expired
                      - partially_refunded
                      - refunded
                    example: paid
                  client_name:
                    type: string
                    nullable: true
                    example: Иван Иванов
                  client_comment:
                    type: string
                    nullable: true
                  is_sandbox:
                    type: boolean
                    example: false
                  total_refunded:
                    type: string
                    example: "0.00"
                  is_fully_refunded:
                    type: boolean
                    example: false
                  kaspi_invoice_id:
                    type: string
                    example: "13234689513"
                  items:
                    type: array
                    description: Товары счёта (snapshot на момент создания). Пустой массив — организация без каталога или старый счёт.
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: ID позиции
                          example: 1
                        invoice_id:
                          type: integer
                          description: ID счёта
                          example: 42
                        catalog_item_id:
                          type: integer
                          nullable: true
                          description: ID товара из каталога. null если товар удалён.
                          example: 5
                        name:
                          type: string
                          description: Название товара (snapshot)
                          example: Coffee Latte
                        price:
                          type: string
                          description: Цена за единицу (snapshot)
                          example: "1800.00"
                        count:
                          type: integer
                          description: Количество
                          example: 2
                        unit_id:
                          type: integer
                          description: ID единицы измерения
                          example: 1
                        discount:
                          type: string
                          nullable: true
                          description: Скидка на строку
                  subtotal:
                    type: string
                    description: Сумма до скидок (появляется только при наличии скидки)
                    example: "16500.00"
                  discount_sum:
                    type: string
                    description: Общая сумма скидки (появляется только при наличии скидки)
                    example: "1500.00"
                  discount_percentage:
                    type: string
                    description: Глобальный % скидки (появляется только если передан)
                    example: "10"
                  paid_at:
                    type: string
                    format: date-time
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
        404:
          description: Счёт не найден
  "/invoices/{id}/cancel":
    post:
      summary: Отменить счёт
      description: Отменяет счёт со статусом pending. Sandbox → 200 (синхронно), Production → 202 (асинхронно через Kaspi).
      operationId: cancelInvoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Счёт отменён (sandbox)
          content:
            "application/json":
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invoice cancelled successfully
                  invoice:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 42
                      status:
                        type: string
                        example: cancelled
        202:
          description: Отмена поставлена в очередь (production)
          content:
            "application/json":
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invoice cancellation queued
                  invoice_id:
                    type: integer
                    example: 42
        400:
          description: Счёт нельзя отменить (не pending)
        404:
          description: Счёт не найден
  "/invoices/{id}/refund":
    post:
      summary: Создать возврат
      description: Создаёт полный или частичный возврат по оплаченному счёту. Без amount — полный возврат.
      operationId: createRefund
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID счёта
      requestBody:
        content:
          "application/json":
            schema:
              type: object
              properties:
                amount:
                  type: number
                  description: Сумма возврата (0.01-99999999.99). Если не указано — полный возврат.
                  minimum: 0.01
                  maximum: 99999999.99
                  example: 5000
                reason:
                  type: string
                  description: Причина возврата (макс 500 символов)
                  maxLength: 500
                  example: Возврат товара
                return_items:
                  type: array
                  description: "Конкретные позиции для возврата (для счетов с корзиной товаров). Формат: { catalog_item_id, count }"
                  items:
                    type: object
                    properties:
                      catalog_item_id:
                        type: integer
                        description: ID товара из каталога
                      count:
                        type: integer
                        description: Количество
                        minimum: 1
                    required:
                      - catalog_item_id
                      - count
      responses:
        201:
          description: Возврат создан и поставлен в очередь
          content:
            "application/json":
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Refund queued for processing
                  refund:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 5
                      invoice_id:
                        type: integer
                        example: 42
                      amount:
                        type: string
                        example: "5000.00"
                      reason:
                        type: string
                        nullable: true
                        example: Возврат товара
                      status:
                        type: string
                        enum:
                          - pending
                          - processing
                          - completed
                          - failed
                        example: pending
                      created_at:
                        type: string
                        format: date-time
                  invoice:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 42
                      amount:
                        type: string
                        example: "15000.00"
                      total_refunded:
                        type: string
                        example: "5000.00"
                      available_for_refund:
                        type: number
                        description: Сумма доступная для возврата (число, не строка)
                        example: 10000
                      pending_refund_amount:
                        type: number
                        description: Сумма ожидающих возвратов (число, не строка)
                        example: 0
        400:
          description: Нельзя сделать возврат (счёт не оплачен или полностью возвращён)
        404:
          description: Счёт не найден
  "/invoices/{id}/refunds":
    get:
      summary: Возвраты по счёту
      description: Список возвратов для конкретного счёта с информацией о счёте
      operationId: listInvoiceRefunds
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID счёта
      responses:
        200:
          description: Список возвратов с информацией о счёте
          content:
            "application/json":
              schema:
                type: object
                properties:
                  invoice:
                    type: object
                    description: Информация о счёте
                    properties:
                      id:
                        type: integer
                        example: 42
                      amount:
                        type: string
                        example: "15000.00"
                      total_refunded:
                        type: string
                        example: "5000.00"
                      available_for_refund:
                        type: number
                        example: 10000
                      is_fully_refunded:
                        type: boolean
                        example: false
                  refunds:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 5
                        invoice_id:
                          type: integer
                          example: 42
                        amount:
                          type: string
                          example: "5000.00"
                        status:
                          type: string
                          enum:
                            - pending
                            - processing
                            - completed
                            - failed
                          example: completed
                        reason:
                          type: string
                          nullable: true
                          example: Возврат товара
                        items:
                          type: array
                          description: Позиции возврата
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                              refund_id:
                                type: integer
                              invoice_item_id:
                                type: integer
                              catalog_item_id:
                                type: integer
                                nullable: true
                              name:
                                type: string
                              price:
                                type: string
                              count:
                                type: integer
                              amount:
                                type: string
                        created_at:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    example: 1
        404:
          description: Счёт не найден
  "/invoices/status/check":
    post:
      summary: Массовая проверка статусов
      description: Массовая проверка статусов нескольких счетов за один запрос (async). Статусы обновляются асинхронно — получайте результат через GET /invoices/{id} или webhook `invoice.status_changed`.
      operationId: bulkCheckInvoiceStatus
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              properties:
                invoice_ids:
                  type: array
                  description: ID счетов для проверки (макс 100)
                  maxItems: 100
                  example:
                    - 42
                    - 43
                    - 44
                  items:
                    type: integer
              required:
                - invoice_ids
      responses:
        200:
          description: Задачи на обновление статусов поставлены в очередь
          content:
            "application/json":
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Status check jobs dispatched
                    description: Подтверждение постановки задач в очередь
                  count:
                    type: integer
                    description: Количество поставленных задач
                    example: 3
        401:
          description: Неверный API ключ
        422:
          description: Ошибка валидации
  "/refunds":
    get:
      summary: Список возвратов
      description: Возвращает список всех возвратов с пагинацией и фильтрацией
      operationId: listRefunds
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: status[]
          in: query
          schema:
            type: array
            items:
              type: string
              enum:
                - pending
                - processing
                - completed
                - failed
          description: Фильтр по статусам
        - name: invoice_id
          in: query
          schema:
            type: integer
          description: Фильтр по ID счёта
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
      responses:
        200:
          description: Список возвратов
          content:
            "application/json":
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 5
                        invoice_id:
                          type: integer
                          example: 42
                        amount:
                          type: string
                          example: "5000.00"
                        kaspi_refund_id:
                          type: string
                          nullable: true
                          description: ID возврата в Kaspi
                          example: REF-123
                        kaspi_status:
                          type: string
                          nullable: true
                          description: Статус в Kaspi
                          example: completed
                        status:
                          type: string
                          example: completed
                        reason:
                          type: string
                          nullable: true
                          example: Возврат товара
                        initiated_by:
                          type: string
                          description: Кем инициирован (api, dashboard)
                          example: api
                        error_message:
                          type: string
                          nullable: true
                          description: Сообщение об ошибке (для failed)
                        created_at:
                          type: string
                          format: date-time
                        invoice:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 42
                            external_order_id:
                              type: string
                              nullable: true
                              example: order_123
                            amount:
                              type: string
                              example: "15000.00"
                            status:
                              type: string
                              example: paid
                            kaspi_invoice_id:
                              type: string
                              nullable: true
                              example: "13234689513"
                        items:
                          type: array
                          description: Позиции возврата (пусто если возврат по сумме)
                          items:
                            type: object
                            properties:
                              id:
                                type: integer
                                example: 1
                              refund_id:
                                type: integer
                                example: 5
                              invoice_item_id:
                                type: integer
                                example: 10
                              catalog_item_id:
                                type: integer
                                nullable: true
                                example: 3
                              name:
                                type: string
                                example: Coffee Latte
                              price:
                                type: string
                                example: "1800.00"
                              count:
                                type: integer
                                example: 1
                              amount:
                                type: string
                                example: "1800.00"
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 3
                      per_page:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 25
  "/refunds/{id}":
    get:
      summary: Получить возврат
      description: Получить детали конкретного возврата по ID
      operationId: getRefund
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Детали возврата
          content:
            "application/json":
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 5
                  invoice_id:
                    type: integer
                    example: 42
                  amount:
                    type: string
                    example: "5000.00"
                  kaspi_refund_id:
                    type: string
                    nullable: true
                    description: ID возврата в Kaspi
                    example: REF-123
                  kaspi_status:
                    type: string
                    nullable: true
                    description: Статус в Kaspi
                    example: completed
                  status:
                    type: string
                    example: completed
                  reason:
                    type: string
                    nullable: true
                    example: Возврат товара
                  initiated_by:
                    type: string
                    description: Кем инициирован
                    example: api
                  error_message:
                    type: string
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
                  invoice:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 42
                      external_order_id:
                        type: string
                        nullable: true
                        example: order_123
                      amount:
                        type: string
                        example: "15000.00"
                      total_refunded:
                        type: string
                        example: "5000.00"
                      is_fully_refunded:
                        type: boolean
                        example: false
                      status:
                        type: string
                        example: paid
