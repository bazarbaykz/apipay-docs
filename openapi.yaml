        202:
          description: Удаление товара поставлено в очередь (production)
          content:
            "application/json":
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Catalog item deletion queued
                  catalog_item_id:
                    type: integer
        404:
          description: Товар не найден
  "/subscriptions":
    post:
      summary: Создать подписку
      description: "Создаёт автоматическую подписку с повторяющимися счетами по расписанию. Поддерживает два режима: без корзины (передать amount) или с корзиной (передать cart_items, сумма рассчитывается автоматически)."
      operationId: createSubscription
      requestBody:
        required: true
        content:
          "application/json":
            schema:
              type: object
              properties:
                phone_number:
                  type: string
                  description: "Телефон клиента (формат: 8XXXXXXXXXX)"
                  pattern: ^8[0-9]{10}$
                  example: "87001234567"
                amount:
                  type: number
                  description: Сумма (100 - 1000000). Игнорируется при наличии cart_items.
                  minimum: 100
                  maximum: 1000000
                  example: 5000
                billing_period:
                  type: string
                  enum:
                    - daily
                    - weekly
                    - biweekly
                    - monthly
                    - quarterly
                    - yearly
                  description: Период выставления счетов
                billing_day:
                  type: integer
                  description: День периода (1-28)
                  minimum: 1
                  maximum: 28
                  example: 1
                description:
                  type: string
                  description: Описание (макс 255)
                  maxLength: 255
                  example: Ежемесячная подписка
                subscriber_name:
                  type: string
                  description: Имя подписчика (макс 255)
                  maxLength: 255
                  example: Иван Иванов
                external_subscriber_id:
                  type: string
                  description: Ваш ID подписчика (макс 255)
                  maxLength: 255
                  example: CLIENT-001
                started_at:
                  type: string
                  format: date
                  description: Дата начала (по умолчанию сегодня)
                max_retry_attempts:
                  type: integer
                  description: Макс. попыток повтора (1-10)
                  minimum: 1
                  maximum: 10
                retry_interval_hours:
                  type: integer
                  description: Интервал между попытками в часах (1-168)
                  minimum: 1
                  maximum: 168
                grace_period_days:
                  type: integer
                  description: Льготный период в днях (1-30)
                  minimum: 1
                  maximum: 30
                metadata:
                  type: object
                  description: Произвольные данные в формате JSON
                cart_items:
                  type: array
                  description: Товары корзины (только для организаций с каталогом). При наличии amount игнорируется.
                  items:
                    type: object
                    properties:
                      catalog_item_id:
                        type: integer
                        description: ID товара из каталога (поле id из GET /catalog)
                      count:
                        type: integer
                        description: Количество
                        minimum: 1
                    required:
                      - catalog_item_id
                      - count
                bill_immediately:
                  type: boolean
                  default: false
                  description: "Если true — первый счёт выставляется сразу после создания подписки. По умолчанию false (первый счёт по расписанию в next_billing_at)."
              required:
                - phone_number
                - billing_period
      responses:
        201:
          description: Подписка создана
          content:
            "application/json":
              schema:
                type: object
                properties:
                  subscription:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 10
                      phone_number:
                        type: string
                        example: "87001234567"
                      amount:
                        type: string
                        example: "5000.00"
                      billing_period:
                        type: string
                        example: monthly
                      billing_day:
                        type: integer
                        example: 1
                      status:
                        type: string
                        example: active
                      description:
                        type: string
                        nullable: true
                        example: Ежемесячная подписка
                      subscriber_name:
                        type: string
                        nullable: true
                        example: Иван Иванов
                      external_subscriber_id:
                        type: string
                        nullable: true
                        example: CLIENT-001
                      next_billing_at:
                        type: string
                        format: date-time
                      is_sandbox:
                        type: boolean
                        example: false
                      created_at:
                        type: string
                        format: date-time
        403:
          description: Организация не верифицирована
        422:
          description: Ошибка валидации
    get:
      summary: Список подписок
      operationId: listSubscriptions
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 10
        - name: status
          in: query
          schema:
            type: string
            enum:
              - active
              - paused
              - cancelled
              - expired
          description: Фильтр по статусу
        - name: phone_number
          in: query
          schema:
            type: string
          description: Фильтр по телефону
        - name: external_subscriber_id
          in: query
          schema:
            type: string
          description: Фильтр по ID подписчика
      responses:
        200:
          description: Список подписок
          content:
            "application/json":
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 10
                        phone_number:
                          type: string
                          example: "87001234567"
                        subscriber_name:
                          type: string
                          nullable: true
                          example: Иван Иванов
                        amount:
                          type: string
                          example: "5000.00"
                        billing_period:
                          type: string
                          example: monthly
                        status:
                          type: string
                          example: active
                        next_billing_at:
                          type: string
                          format: date-time
                        is_sandbox:
                          type: boolean
                          example: false
                        created_at:
                          type: string
                          format: date-time
                  meta:
                    type: object
                    properties:
                      current_page:
                        type: integer
                        example: 1
                      last_page:
                        type: integer
                        example: 3
                      per_page:
                        type: integer
                        example: 10
                      total:
                        type: integer
                        example: 28
